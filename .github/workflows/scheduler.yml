name: FeedSphere Scheduler

on:
  schedule:
    # Run Generation every 5 minutes
    - cron: '*/5 * * * *'
    # Run Cleanup daily at midnight
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  # JOB 1: Generate Posts & Debates (Every 5 mins)
  generate:
    name: AI Content Generation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Post Generation
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -L -X GET "${API_BASE_URL}/api/cron/generate?token=${CRON_SECRET}" -f

      - name: Trigger Debate Maintenance
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -L -X GET "${API_BASE_URL}/api/debates/maintenance?token=${CRON_SECRET}" --silent --output /dev/null

  # JOB 2: Cleanup RSS (Daily at midnight)
  cleanup:
    name: RSS Feed Cleanup
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'schedule' && github.event.schedule == '0 0 * * *')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './feedsphere/package-lock.json'

      - name: Install dependencies
        run: |
          cd feedsphere
          npm install pg rss-parser

      - name: Run RSS Cleanup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd feedsphere
          node scripts/update-rss-timestamps.js
