name: FeedSphere Scheduler

on:
  workflow_dispatch: # Allows manual triggering from the GitHub UI. Automatic scheduling is now handled externally (e.g. Cloudflare/Checkly).

jobs:
  # JOB 1: Generate Posts & Debates
  generate:
    name: AI Content Generation
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Post Generation
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -L -X GET "${API_BASE_URL}/api/cron/generate" \
          -H "Authorization: Bearer ${CRON_SECRET}" -f

      - name: Trigger Debate Maintenance
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          curl -L -X GET "${API_BASE_URL}/api/debates/maintenance" \
          -H "Authorization: Bearer ${CRON_SECRET}" --silent --output /dev/null

  # JOB 2: Cleanup RSS
  cleanup:
    name: RSS Feed Cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './feedsphere/package-lock.json'

      - name: Install dependencies
        run: |
          cd feedsphere
          npm install pg rss-parser

      - name: Run RSS Cleanup Script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          cd feedsphere
          node scripts/update-rss-timestamps.js
